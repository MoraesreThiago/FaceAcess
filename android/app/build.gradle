plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter plugin applied via settings.gradle
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "com.example.faceaccess"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.example.faceaccess"
        minSdk 26                   // tflite_flutter requires >= 26
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }

    // Prevent Gradle from compressing the TFLite model inside the APK
    aaptOptions {
        noCompress "tflite"
        noCompress "lite"
    }

    // ── Flavors ────────────────────────────────────────────────────────────
    // PR #6.5: o app é publicado como dois APKs distintos a partir do
    // mesmo código-fonte.
    //   - admin : hospeda a UI de gestão (portas, pessoas, matriz de
    //             acesso). A UI real chega em PRs futuros; por ora o
    //             flavor apenas existe e o LoginScreen mostra só o card
    //             de Administrador.
    //   - porta : dispositivo de parede para reconhecimento facial. Só
    //             mostra o card "Acesso Porta".
    // Nada da camada de domínio/aplicação/infra é flavor-specific — tudo
    // é compartilhado. A diferença é apenas entrypoint + UI visível.
    flavorDimensions "app"
    productFlavors {
        admin {
            dimension "app"
            applicationIdSuffix ".admin"
            versionNameSuffix "-admin"
            resValue "string", "app_name", "BemBrasil Admin"
        }
        porta {
            dimension "app"
            applicationIdSuffix ".porta"
            versionNameSuffix "-porta"
            resValue "string", "app_name", "BemBrasil Porta"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug  // swap for real keystore in production
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
